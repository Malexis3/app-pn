<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Police Nationale - MDT</title>
<link rel="icon" href="../Images/pn2.jpeg">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#fff;
}

header{
    background:#050a18;
    padding:10px;
    border-bottom:1px solid #1a2747;
}

.banner{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:40px;
}

.navigation{
    list-style:none;
    padding:0;
    margin-top:10px;
}

.navigation a{
    color:white;
    text-decoration:none;
    background:#1a2747;
    padding:6px 10px;
    border-radius:5px;
}

.container{
    display:flex;
    height:calc(100vh - 140px);
}

.sidebar{
    width:260px;
    background:#050a18;
    padding:15px;
    border-right:1px solid #1a2747;
}

.main{
    flex:1;
    padding:20px;
}

.agent{
    background:#1a2747;
    margin:6px 0;
    padding:8px;
    border-radius:6px;
    cursor:grab;
}

.unit{
    background:#111a2e;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

.dropzone{
    min-height:60px;
    border:2px dashed #2a3b5c;
    padding:5px;
    border-radius:6px;
}

button{
    padding:6px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.green{background:green;color:#fff}
.red{background:#aa2a2a;color:#fff}

footer{
    text-align:center;
    padding:10px;
    background:#050a18;
    border-top:1px solid #1a2747;
}
</style>
</head>

<body>

<header>
    <div class="banner">
        <img src="../Images/pn1.jpeg" class="logo">
        <h1>Police Nationale</h1>
    </div>
</header>

<div class="topbar">
    <button onclick="priseService()" class="green">Prise de service</button>
</div>

<div class="container">

    <div class="sidebar">
        <h3>Effectifs</h3>
        <div id="agents"></div>
    </div>

    <div class="main">
        <h2>Patrouilles</h2>
        <button onclick="createUnit()">Créer une unité</button>
        <div id="units"></div>
    </div>

</div>
<div class="container">

<div class="sidebar">
<h3>Effectifs</h3>
<div id="agents"></div>
</div>

<div class="main">
<h2>Unités actives</h2>
<button class="green" onclick="createUnit()">+ Créer unité</button>
<div id="units"></div>
</div>

</div>

<footer>
<p>&copy; 2026 Police Nationale - Crée par Alexis_tvv</p>
</footer>
<script>
    async function priseService() {
    await fetch("/dashboard/prise-service", { method: "POST" });
    loadAgents();
}

async function loadAgents() {
    const res = await fetch("/dashboard/agents-service");
    const data = await res.json();

    const container = document.getElementById("agents");
    container.innerHTML = "";

    data.forEach(a => {
        const div = document.createElement("div");
        div.className = "agent";
        div.draggable = true;
        div.id = "agent-" + a.id;

        div.innerHTML = `
            <img src="${a.avatar}" width="30" style="border-radius:50%">
            ${a.username}
        `;

        div.ondragstart = drag;
        container.appendChild(div);
    });
}

setInterval(loadAgents, 5000); // refresh auto
loadAgents();
</script>

</body>
</html>
