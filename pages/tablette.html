<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Police Nationale - MDT</title>
<link rel="icon" href="../Images/pn2.jpeg">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:#fff;
}

header{
    background:#050a18;
    padding:10px;
    border-bottom:1px solid #1a2747;
}

.banner{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:40px;
}

.navigation{
    list-style:none;
    padding:0;
    margin-top:10px;
}

.navigation a{
    color:white;
    text-decoration:none;
    background:#1a2747;
    padding:6px 10px;
    border-radius:5px;
}

.container{
    display:flex;
    height:calc(100vh - 140px);
}

.sidebar{
    width:260px;
    background:#050a18;
    padding:15px;
    border-right:1px solid #1a2747;
}

.main{
    flex:1;
    padding:20px;
}

.agent{
    background:#1a2747;
    margin:6px 0;
    padding:8px;
    border-radius:6px;
    cursor:grab;
}

.unit{
    background:#111a2e;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

.dropzone{
    min-height:60px;
    border:2px dashed #2a3b5c;
    padding:5px;
    border-radius:6px;
}

button{
    padding:6px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.green{background:green;color:#fff}
.red{background:#aa2a2a;color:#fff}

footer{
    text-align:center;
    padding:10px;
    background:#050a18;
    border-top:1px solid #1a2747;
}
</style>
</head>

<body>

<header>
    <div class="banner">
        <img src="../Images/pn1.jpeg" class="logo">
        <h1>Police Nationale - MDT</h1>
    </div>
    <nav>
        <ul class="navigation">
            <li><a href="/dashboard">Retour</a></li>
        </ul>
    </nav>
</header>

<div class="container">

<div class="sidebar">
<h3>Effectifs</h3>
<div id="agents"></div>
</div>

<div class="main">
<h2>Unités actives</h2>
<button class="green" onclick="createUnit()">+ Créer unité</button>
<div id="units"></div>
</div>

</div>

<footer>
<p>&copy; 2026 Police Nationale - Crée par Alexis_tvv</p>
</footer>

<script>
const currentUser = { roles:["COMMANDEMENT"] };

const AGENTS = [
 {id:1,name:"Lucas",group:"PS"},
 {id:2,name:"Tom",group:"BAC"},
 {id:3,name:"Mathys",group:"PS"},
 {id:4,name:"Antoine",group:"COMMAND"}
];

function hasRole(role){return currentUser.roles.includes(role)}

const container = document.getElementById("agents");

AGENTS.forEach(a=>{
 let div=document.createElement("div");
 div.className="agent";
 div.id="agent-"+a.id;
 div.dataset.group=a.group;
 div.draggable=true;
 div.innerHTML=`${a.name}<br><button class='green' onclick='prise(${a.id})'>Prise de service</button>`;
 div.style.display="none";
 div.ondragstart=drag;
 container.appendChild(div);
});

function prise(id){
 document.getElementById("agent-"+id).style.display="block";
}

function drag(ev){ev.dataTransfer.setData("text",ev.target.id)}
function allowDrop(ev){ev.preventDefault()}

function drop(ev){
 ev.preventDefault();
 let id=ev.dataTransfer.getData("text");
 let agent=document.getElementById(id);
 let agentGroup=agent.dataset.group;
 let unitGroup=ev.target.closest(".unit").dataset.group;

 if(agentGroup!==unitGroup){
  alert("Spécialité incompatible");
  return;
 }

 ev.target.appendChild(agent);
}

function createUnit(){
 if(!hasRole("COMMANDEMENT")){
  alert("Accès refusé");
  return;
 }

 let name=prompt("Nom unité");
 let group=prompt("Groupe (PS, BAC, COMMAND)");

 let div=document.createElement("div");
 div.className="unit";
 div.dataset.group=group;

 div.innerHTML=`
  <h3>${name}</h3>
  <div class='dropzone' ondrop='drop(event)' ondragover='allowDrop(event)'></div>
  <button class='red' onclick='this.parentElement.remove()'>Supprimer</button>
 `;

 document.getElementById("units").appendChild(div);
}
</script>

</body>
</html>
