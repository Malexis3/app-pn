<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Nationale - MDT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: #fff;
        }

        header {
            background: #050a18;
            padding: 10px;
            border-bottom: 1px solid #1a2747;
        }

        .banner {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .banner img {
            width: 50px;
            border-radius: 5px;
        }

        .topbar {
            padding: 10px;
            background: #0e1a33;
            border-bottom: 1px solid #1a2747;
        }

        .green {
            background: green;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
        }

        .green:hover {
            opacity: 0.8;
        }

        .container {
            display: flex;
            height: calc(100vh - 150px);
        }

        .sidebar {
            width: 300px;
            background: #050a18;
            padding: 15px;
            border-right: 1px solid #1a2747;
            overflow-y: auto;
        }

        .agent {
            background: #1a2747;
            margin: 10px 0;
            padding: 10px;
            border-radius: 6px;
            cursor: grab;
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agent img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .status {
            margin-top: 8px;
            padding: 3px 6px;
            border-radius: 5px;
            display: inline-block;
            font-size: 12px;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .unit {
            background: #111a2e;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #20355d;
        }

        .dropzone {
            min-height: 80px;
            padding: 10px;
            border: 2px dashed #304a7a;
            border-radius: 8px;
        }

        .btn-delete {
            margin-top: 10px;
            background: #8b1e1e;
            padding: 7px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        footer {
            background: #050a18;
            padding: 10px;
            text-align: center;
            border-top: 1px solid #1a2747;
        }

        select {
            margin-top: 8px;
            width: 100%;
            padding: 5px;
            border-radius: 6px;
            background: #18233b;
            color: white;
            border: 1px solid #304a7a;
        }
    </style>
</head>

<body>

<header>
    <div class="banner">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Logo_Police_nationale_fran%C3%A7aise.svg">
        <h1>Police Nationale - MDT</h1>
    </div>
</header>

<div class="topbar">
    <button class="green" onclick="priseService()">Prise de service</button>
</div>

<div class="container">

    <div class="sidebar">
        <h2>Effectifs</h2>
        <div id="agents"></div>
    </div>

    <div class="main">
        <h2>Patrouilles</h2>
        <button class="green" onclick="createUnit()">Créer une unité</button>
        <div id="units"></div>
    </div>

</div>

<footer>
    © 2026 Police Nationale — Alexis_tvv
</footer>


<script>

    /* --- CONFIG --- */
    const USER_IS_COMMAND = true;


    /* --- STATUTS --- */
    const STATUS = {
        "En difficulté": { color: "red", blink: true, priority: 1 },
        "En service": { color: "blue", priority: 2 },
        "En intervention": { color: "orange", priority: 3 },
        "En opération": { color: "purple", priority: 4 },
        "Opération spéciale": { color: "darkred", priority: 5 },
        "Off radio": { color: "grey", priority: 6 },
        "Indisponible": { color: "darkgrey", priority: 7 },
        "Astreinte": { color: "cyan", priority: 8 },
        "RDV": { color: "yellow", priority: 9 },
        "Administratif": { color: "lightblue", priority: 10 },
        "Dispatch": { color: "teal", priority: 11 },
        "Hors service": { color: "black", priority: 12 }
    };


    /* --- PRISE SERVICE (fixée) --- */
    async function priseService() {
        try {
            await fetch("/prise-service", { method: "POST" });
        } catch (e) {
            console.warn("Mode test : aucune connexion backend.");
        }

        loadAgents();
    }


    /* --- CHARGE AGENTS EN SERVICE --- */
    async function loadAgents() {

        let agents = [];

        try {
            const res = await fetch("/agents-service");
            agents = await res.json();
        } catch {
        }

        const box = document.getElementById("agents");
        box.innerHTML = "";

        agents.forEach(a => {
            let status = a.status || "En service";

            let div = document.createElement("div");
            div.className = "agent";
            div.draggable = true;
            div.id = "agent-" + a.id;

            div.ondragstart = drag;

            div.innerHTML = `
                <div class="agent-header">
                    <img src="${a.avatar}">
                    <span>${a.username}</span>
                </div>

                <span class="status ${STATUS[status].blink ? "blink" : ""}" style="background:${STATUS[status].color}">
                    ${status}
                </span>

                <select onchange="changeStatus('${a.id}', this.value)">
                    ${Object.keys(STATUS).map(s =>
                `<option ${s === status ? "selected" : ""}>${s}</option>`
            ).join("")}
                </select>
            `;

            box.appendChild(div);
        });
    }


    /* --- CHANGEMENT DE STATUT --- */
    function changeStatus(id, status) {
        const agent = document.getElementById("agent-" + id);

        const badge = agent.querySelector(".status");
        badge.innerText = status;
        badge.style.background = STATUS[status].color;
        badge.classList.toggle("blink", STATUS[status].blink === true);

        loadAgents();
    }


    /* --- DRAG & DROP --- */
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
    function allowDrop(ev) { ev.preventDefault(); }
    function drop(ev) {
        ev.preventDefault();
        let id = ev.dataTransfer.getData("text");
        ev.target.appendChild(document.getElementById(id));
    }


    /* --- CRÉATION UNITÉ --- */
    function createUnit() {

        if (!USER_IS_COMMAND) {
            alert("Accès refusé : COMMANDEMENT uniquement.");
            return;
        }

        let name = prompt("Nom de l'unité :");
        if (!name) return;

        let div = document.createElement("div");
        div.className = "unit";

        div.innerHTML = `
            <h3>${name}</h3>
            <div class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <button class="btn-delete" onclick="this.parentElement.remove()">Supprimer unité</button>
        `;

        document.getElementById("units").appendChild(div);
    }


    /* --- AUTO-REFRESH --- */
    loadAgents();
    setInterval(loadAgents, 5000);

</script>

</body>

</html>
