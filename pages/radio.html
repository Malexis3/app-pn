<html>

<body>
    <h1>Talkie-Walkie Web</h1>
    <select id="channel">
        <option value="alpha">Canal Alpha</option>
        <option value="bravo">Canal Bravo</option>
    </select>

    <button id="ptt">TALK</button>

    <script>
        const socket = io('http://localhost:3000');
        const ptt = document.getElementById('ptt');
        const channelSelect = document.getElementById('channel');

        let localStream;
        let pc;

        async function initCall() {
            pc = new RTCPeerConnection();

            pc.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit('webrtc-ice', { candidate: event.candidate });
                }
            };

            pc.ontrack = event => {
                const audio = new Audio();
                audio.srcObject = event.streams[0];
                audio.play();
            };

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }

        async function startPTT() {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('webrtc-offer', offer);
        }

        ptt.addEventListener('mousedown', startPTT);
        ptt.addEventListener('mouseup', () => pc.close());

        socket.on('webrtc-offer', async offer => {
            await pc.setRemoteDescription(offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('webrtc-answer', answer);
        });

        socket.on('webrtc-answer', async answer => {
            await pc.setRemoteDescription(answer);
        });

        socket.on('webrtc-ice', async ice => {
            try { await pc.addIceCandidate(ice.candidate); } catch {}
        });

        channelSelect.addEventListener('change', () => {
            socket.emit('joinChannel', channelSelect.value);
        });

        initCall();
        socket.emit('joinChannel', channelSelect.value);
    </script>
